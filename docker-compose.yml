services:
  app:
    build: .
    container_name: notra-app
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-postgres}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      # Must match how users open the site (https://localhost via Caddy :443)
      AUTH_URL: https://${CADDY_DOMAIN}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      storage:
        condition: service_started

  # Official image: data dir must be /var/lib/postgresql/data. Use 16-alpine (broadly available on amd64/arm64).
  db:
    image: postgres:16-alpine
    container_name: notra-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Interpolated from your project .env at `docker compose` parse time (same values as `db.environment`).
      test:
        [
          'CMD-SHELL',
          'pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB:-postgres}" || exit 1'
        ]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: notra-pgbouncer
    restart: always
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: notra-storage
    restart: always
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      default:
        aliases:
          - notra-storage

  caddy:
    image: caddy:latest
    container_name: notra-caddy
    restart: always
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      - app
      - storage

volumes:
  postgres_data:
  minio_data:
